name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  macos-artifacts:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '27.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install macOS Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-aarch64-apple-darwin-${{ hashFiles('Cargo.lock') }}
          restore-keys: release-aarch64-apple-darwin-

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin -p nanograph-cli

      - name: Package
        run: |
          BINARY=target/aarch64-apple-darwin/release/nanograph
          ARCHIVE=nanograph-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz
          tar czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-aarch64-apple-darwin
          path: |
            nanograph-*.tar.gz
            nanograph-*.tar.gz.sha256

      - name: Build Swift XCFramework
        run: bash tools/swift-package/build_xcframework.sh

      - name: Render publishable Swift package
        run: |
          bash tools/swift-package/render_package.sh \
            --output "$RUNNER_TEMP/nanograph-swift" \
            --version "${GITHUB_REF_NAME#v}" \
            --artifact-path "$PWD/target/swift-xcframework/NanoGraphFFI.xcframework"

      - name: Smoke test rendered Swift package
        run: |
          cd "$RUNNER_TEMP/nanograph-swift"
          swift test

      - name: Upload Swift XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: swift-xcframework
          path: |
            target/swift-xcframework/NanoGraphFFI.xcframework.zip
            target/swift-xcframework/NanoGraphFFI.xcframework.sha256

  release:
    needs: macos-artifacts
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  update-homebrew:
    needs: release
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Dispatch formula update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: nanograph/homebrew-tap
          event-type: update-formula
          client-payload: '{"tag": "${{ github.ref_name }}"}'
